apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: analytics-data
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/TU_USUARIO/docker-k8s-101/api:latest
          env:
            - name: DATABASE_URL
              value: postgresql://analytics:analytics@db:5432/analytics
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: analytics-data
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP