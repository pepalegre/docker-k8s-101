name: 04-etl-image

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
    paths:
      - "labs/04-k8s-analitica/trabajo/apps/etl/**"
      - ".github/workflows/04-etl-image.yml"
  pull_request:
    paths:
      - "labs/04-k8s-analitica/trabajo/apps/etl/**"
      - ".github/workflows/04-etl-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/docker-k8s-101/etl
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build y push
        uses: docker/build-push-action@v6
        with:
          context: labs/04-k8s-analitica/trabajo/apps/etl
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}